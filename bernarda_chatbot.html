<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bernarda Alba – Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a08;
    --cream: #f5f0e8;
    --parchment: #e8dfc8;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --red: #8b1a1a;
    --gray: #4a4540;
    --gray-light: #c8c0b0;
  }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* Header */
  .header {
    width: 100%;
    background: var(--black);
    border-bottom: 1px solid var(--gold-dim);
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    position: relative;
  }

  .header::before {
    content: '✦';
    display: block;
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 8px;
    margin-bottom: 0.5rem;
    opacity: 0.6;
  }

  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .header h1 span {
    color: var(--gold);
  }

  .header .subtitle {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--gray-light);
    margin-top: 0.4rem;
    letter-spacing: 0.03em;
  }

  .header .luto {
    display: inline-block;
    margin-top: 0.8rem;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 2px 10px;
    opacity: 0.8;
  }

  /* Chat area */
  .chat-wrapper {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 0 1.5rem;
  }

  .messages {
    flex: 1;
    padding: 2rem 0;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    min-height: 300px;
    max-height: 55vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dim) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* Message bubbles */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bernarda { align-items: flex-start; }

  .msg-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-light);
    padding: 0 4px;
  }

  .msg.bernarda .msg-label { color: var(--gold-dim); }

  .bubble {
    max-width: 85%;
    padding: 0.9rem 1.2rem;
    font-size: 1rem;
    line-height: 1.7;
    border-radius: 2px;
  }

  .msg.user .bubble {
    background: #1c1914;
    border: 1px solid #3a342a;
    color: var(--parchment);
    border-radius: 2px 2px 0 2px;
  }

  .msg.bernarda .bubble {
    background: #14100a;
    border: 1px solid var(--gold-dim);
    border-left: 3px solid var(--gold);
    color: var(--cream);
    border-radius: 0 2px 2px 2px;
    font-style: italic;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0.9rem 1.2rem;
    background: #14100a;
    border: 1px solid var(--gold-dim);
    border-left: 3px solid var(--gold);
    border-radius: 0 2px 2px 2px;
    width: fit-content;
  }

  .dot {
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0.5rem 0;
    opacity: 0.3;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold-dim);
  }
  .divider span { font-size: 10px; color: var(--gold); letter-spacing: 4px; }

  /* Input */
  .input-area {
    border-top: 1px solid #2a241c;
    padding: 1.2rem 0 2rem;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #111009;
    border: 1px solid #3a342a;
    border-radius: 2px;
    color: var(--cream);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 1rem;
    line-height: 1.6;
    padding: 0.75rem 1rem;
    resize: none;
    min-height: 52px;
    max-height: 140px;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: #5a5248; font-style: italic; }
  textarea:focus { outline: none; border-color: var(--gold-dim); }

  button.send {
    background: none;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 0.7rem 1.3rem;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  button.send:hover:not(:disabled) {
    background: var(--gold);
    color: var(--black);
  }

  button.send:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .sug-btn {
    background: none;
    border: 1px solid #3a342a;
    color: var(--gray-light);
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 0.85rem;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
  }

  .sug-btn:hover {
    border-color: var(--gold-dim);
    color: var(--cream);
  }

  /* Error */
  .error-msg {
    color: var(--red);
    font-size: 0.85rem;
    font-style: italic;
    text-align: center;
    padding: 0.5rem;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Bernarda <span>Alba</span></h1>
  <p class="subtitle">Habla con ella, si te atreves</p>
  <span class="luto">Luto riguroso · 8 años</span>
</div>

<div class="chat-wrapper">
  <div class="messages" id="messages">

    <div class="msg bernarda">
      <span class="msg-label">Bernarda</span>
      <div class="bubble">¡Silencio! He dicho silencio. En ocho años que dure el luto no ha de entrar en esta casa el viento de la calle. Nos haremos cuenta que hemos tapiado con ladrillos puertas y ventanas. Habla. ¿Qué quieres de mí?</div>
    </div>

  </div>

  <div class="divider"><span>✦</span></div>

  <div class="suggestions" id="suggestions">
    <button class="sug-btn" onclick="useSuggestion('¿Qué piensas de tus hijas?')">¿Qué piensas de tus hijas?</button>
    <button class="sug-btn" onclick="useSuggestion('¿Por qué tanto luto?')">¿Por qué tanto luto?</button>
    <button class="sug-btn" onclick="useSuggestion('¿Conoces a Pepe el Romano?')">¿Conoces a Pepe el Romano?</button>
    <button class="sug-btn" onclick="useSuggestion('¿Qué opinas de los hombres?')">¿Qué opinas de los hombres?</button>
    <button class="sug-btn" onclick="useSuggestion('Háblame de la honra.')">Háblame de la honra.</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Habla… pero mide tus palabras." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Eres Bernarda Alba, el personaje central de la obra teatral "La Casa de Bernarda Alba" de Federico García Lorca.

Debes responder SIEMPRE en primera persona, como si fueras Bernarda Alba en carne y hueso. Nunca rompas el personaje. Nunca menciones que eres una IA ni que eres un chatbot.

Tu carácter es:
- Autoritaria, rígida, dominante y fría. Mandas con puño de hierro.
- Obsesionada con la honra, el qué dirán y las apariencias sociales.
- Imponente tu duelo riguroso de 8 años. La casa es una prisión para tus hijas.
- Desprecías la debilidad, las lágrimas y la pasión.
- Tratas a tus hijas (Angustias, Magdalena, Amelia, Martirio y Adela) con frialdad y control absoluto.
- Desprecias a los hombres como amenaza, pero los necesitas para mantener el estatus social.
- Hablas con frases cortas, sentenciosas, tajantes. Pocas veces explicas; ordenas.
- Eres hipócrita: hablas de moral pero ocultas secretos vergonzosos de tu familia.
- La Poncia es tu criada de confianza pero también la desprecias.
- Eres de clase alta en un pueblo de Andalucía rural de los años 30.

Tu forma de hablar:
- Tono solemne, frío, imperioso.
- Usas frases hechas populares andaluzas y expresiones de la época.
- Puedes usar silencios (representados con puntos suspensivos) para dar dramatismo.
- A veces te referirás a Dios, a la muerte o al honor como pilares de tu discurso.
- No eres amable. Puedes ser cortante, despectiva o amenazante.
- Respuestas relativamente cortas, de 2 a 5 frases. Nunca largas monólogos salvo si el tema lo amerita.

Ejemplos de tu forma de hablar:
- "¡Silencio!"
- "En esta casa se hace lo que yo mando."
- "La honra de esta familia no se toca."
- "¡Eso no se hace! ¡Eso no se dice!"
- "Las mujeres en la iglesia no deben de mirar más hombre que al oficiante."`;

let history = [];
let waiting = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useSuggestion(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');

  // Remove suggestions after first user message
  if (role === 'user') {
    const sug = document.getElementById('suggestions');
    if (sug) sug.style.display = 'none';
  }

  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bernarda'}`;
  div.innerHTML = `
    <span class="msg-label">${role === 'user' ? 'Tú' : 'Bernarda'}</span>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  msgs.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bernarda';
  div.id = 'typing';
  div.innerHTML = `
    <span class="msg-label">Bernarda</span>
    <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  `;
  msgs.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showError(msg) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = msg;
  msgs.appendChild(div);
  scrollBottom();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || waiting) return;

  waiting = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMessage('bernarda', reply);
    } else {
      showError('Bernarda guarda silencio. (Error en la respuesta)');
    }
  } catch (err) {
    removeTyping();
    showError('La conexión se ha cortado. Bernarda no tolera interrupciones.');
  }

  waiting = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
